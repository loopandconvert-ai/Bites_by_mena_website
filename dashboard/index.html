<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Login — Bites by Mena</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="login-page">
    <div class="login-card">

      <img src="../logo.svg" alt="Bites by Mena" class="login-logo" />
      <h1>Dashboard Login</h1>
      <p>Enter your password to manage your products.</p>

      <div class="login-error" id="loginError">
        Incorrect password. Please try again.
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login">Log in →</button>
      </form>

    </div>
  </div>

  <script>
    // ── Change the password here ──
    const DASHBOARD_PASSWORD = 'Mena2026!';

    // If already logged in, skip to dashboard
    if (sessionStorage.getItem('bbm_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const entered = document.getElementById('password').value;
      const error   = document.getElementById('loginError');

      if (entered === DASHBOARD_PASSWORD) {
        sessionStorage.setItem('bbm_auth', 'true');
        window.location.href = 'dashboard.html';
      } else {
        error.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  </script>

</body>
</html>
